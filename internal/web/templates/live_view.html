<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tethys</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
    <header class="top">
        <div class="brand">tethys</div>
        <div class="top-meta">{{.GameCount}} games, {{.EngineCount}} engines</div>
    </header>

    <div class="shell">
        {{template "sidebar" .}}

        <main class="container">
            <h1>Live View</h1>
            <div id="live" class="card" data-url="/live/fragment">Loading…</div>

            <div id="queue" class="card" data-url="/live/queue" style="margin-top: 16px;">
                {{template "queue_fragment.html" .}}
            </div>

            <div id="recent_games" class="card" data-url="/live/recent" style="margin-top: 16px;">
                {{template "recent_games_fragment.html" .}}
            </div>
        </main>
    </div>

    <script>
        async function refreshLive() {
            const el = document.getElementById('live');
            const url = el.getAttribute('data-url');
            const res = await fetch(url, { cache: 'no-store' });
            el.innerHTML = await res.text();
        }

        async function refreshQueue() {
            const el = document.getElementById('queue');
            const url = el.getAttribute('data-url');
            const res = await fetch(url, { cache: 'no-store' });
            el.innerHTML = await res.text();
        }

        async function refreshRecentGames() {
            const el = document.getElementById('recent_games');
            const url = el.getAttribute('data-url');
            const res = await fetch(url, { cache: 'no-store' });
            el.innerHTML = await res.text();
        }

        refreshLive();
        refreshQueue();
        refreshRecentGames();

        const es = new EventSource('/api/live/events');
        es.addEventListener('update', () => {
            refreshLive();
            refreshQueue();
            refreshRecentGames();
        });
    </script>
</body>

</html>
